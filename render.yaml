services:
  - type: web
    name: ikstore-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @ikstore/shared build && pnpm --filter api build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://ikstore-api.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: TRUST_PROXY
        value: "true"
      - key: SWAGGER_ENABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FLW_PUBLIC_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_ENCRYPTION_KEY
        sync: false
      - key: FLW_WEBHOOK_HASH
        sync: false
      - key: OPAY_MERCHANT_ID
        sync: false
      - key: OPAY_PUBLIC_KEY
        sync: false
      - key: OPAY_SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMILE_ID_PARTNER_ID
        sync: false
      - key: SMILE_ID_API_KEY
        sync: false
      - key: SMILE_ID_ENVIRONMENT
        value: production
